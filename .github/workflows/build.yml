name: Build Android APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Auto-increment Version
      id: version_bump
      run: |
        python3 -c '
        import re, os
        file_path = "app/build.gradle.kts"
        with open(file_path, "r") as f:
            content = f.read()
        vc_match = re.search(r"versionCode\s*=\s*(\d+)", content)
        vn_match = re.search(r"versionName\s*=\s*\"([^\"]+)\"", content)
        if vc_match and vn_match:
            current_code = int(vc_match.group(1))
            current_name = vn_match.group(1)
            # Use run_number as an absolute increment to guarantee strictly increasing versions
            # even if the git push back to the repository gets blocked by branch protection.
            run_num = int(os.environ.get("RUN_NUM", "0"))
            new_code = current_code + run_num
            parts = current_name.split(".")
            if len(parts) >= 3:
                try:
                    parts[-1] = str(int(parts[-1]) + run_num)
                except ValueError:
                    parts.append(str(run_num))
            elif len(parts) == 2:
                parts.append(str(run_num))
            else:
                parts.append(str(run_num))
            new_name = ".".join(parts)
            content = re.sub(r"versionCode\s*=\s*\d+", f"versionCode = {new_code}", content)
            content = re.sub(r"versionName\s*=\s*\"[^\"]+\"", f"versionName = \"{new_name}\"", content)
            with open(file_path, "w") as f:
                f.write(content)
            print(f"Bumped version code to: {new_code}")
            print(f"Bumped version name to: {new_name}")
            with open(os.environ["GITHUB_OUTPUT"], "a") as env_file:
                env_file.write(f"version_code={new_code}\n")
                env_file.write(f"version_name={new_name}\n")
        else:
            print("Error: Could not parse version details from build.gradle.kts")
            exit(1)
        '
      env:
        RUN_NUM: ${{ github.run_number }}

    - name: Commit and Push Version Change
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add app/build.gradle.kts
        git commit -m "chore: bump version to v${{ steps.version_bump.outputs.version_name }} [skip ci]" || echo "No changes to commit"
        git push origin main || echo "Branch protection or restricted GITHUB_TOKEN permission blocked pushing version changes to branch, continuing with dynamic compilation version instead!"

    - name: Re-generate pristine Gradle Wrapper
      run: gradle wrapper
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Restore Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/app/my-upload-key.jks"

    - name: Build with Gradle
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PATH: ${{ github.workspace }}/app/my-upload-key.jks
        APP_VERSION_CODE: ${{ steps.version_bump.outputs.version_code }}
        APP_VERSION_NAME: ${{ steps.version_bump.outputs.version_name }}
      run: ./gradlew assembleRelease

    - name: Rename APK for release
      run: |
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/SubtitleStudio-v${{ steps.version_bump.outputs.version_name }}.apk

    - name: Create GitHub Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version_bump.outputs.version_name }}
        name: Release v${{ steps.version_bump.outputs.version_name }}
        body: |
          Automatic release of SubtitleStudio application.
          Version Name: ${{ steps.version_bump.outputs.version_name }}
          Version Code: ${{ steps.version_bump.outputs.version_code }}
        files: |
          app/build/outputs/apk/release/SubtitleStudio-v${{ steps.version_bump.outputs.version_name }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
